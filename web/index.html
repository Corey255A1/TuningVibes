  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // --- Metronome audio synthesizer using Web Audio API ---
    window.metronome = {
      audioContext: null,

      _ensureContext: function() {
        if (!this.audioContext || this.audioContext.state === 'closed') {
          this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.audioContext.state === 'suspended') {
          this.audioContext.resume();
        }
      },

      // type: 0 = downbeat (accent), 1 = beat, 2 = subdivision
      playClick: function(type) {
        this._ensureContext();
        const ctx = this.audioContext;
        const now = ctx.currentTime;

        // Frequency and volume by type
        const freqs  = [1100, 750, 500];
        const gains  = [0.9,  0.6, 0.3];
        const decays = [0.06, 0.05, 0.04];

        const freq  = freqs[type]  ?? 750;
        const gain  = gains[type]  ?? 0.6;
        const decay = decays[type] ?? 0.05;

        const osc = ctx.createOscillator();
        const env = ctx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);

        env.gain.setValueAtTime(gain, now);
        env.gain.exponentialRampToValueAtTime(0.001, now + decay);

        osc.connect(env);
        env.connect(ctx.destination);

        osc.start(now);
        osc.stop(now + decay + 0.01);
      }
    };
  </script>
  <script>
    window.audioRecorder = {
      audioContext: null,
      stream: null,
      source: null,
      processor: null,
      onAudioProcessCallback: null,
      
      setOnAudioProcess: function(callback) {
        this.onAudioProcessCallback = callback;
      },
      
      start: async function(sampleRate) {
        try {
          this.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: sampleRate });
          this.stream = await navigator.mediaDevices.getUserMedia({ 
            audio: {
              echoCancellation: false,
              noiseSuppression: false,
              autoGainControl: false
            }, 
            video: false 
          });
          this.source = this.audioContext.createMediaStreamSource(this.stream);
          this.processor = this.audioContext.createScriptProcessor(2048, 1, 1);
          
          this.source.connect(this.processor);
          this.processor.connect(this.audioContext.destination);
          
          this.processor.onaudioprocess = (e) => {
            const channelData = e.inputBuffer.getChannelData(0);
            const samples = Array.from(channelData);
            if (this.onAudioProcessCallback) {
              this.onAudioProcessCallback(samples);
            }
          };
          return this.audioContext.sampleRate;
        } catch (err) {
          console.error("Microphone capture failed:", err);
          return 0;
        }
      },
      
      stop: function() {
        if (this.processor) {
          this.processor.disconnect();
          this.processor = null;
        }
        if (this.source) {
          this.source.disconnect();
          this.source = null;
        }
        if (this.stream) {
          this.stream.getTracks().forEach(track => track.stop());
          this.stream = null;
        }
        if (this.audioContext) {
          if (this.audioContext.state !== 'closed') {
            this.audioContext.close();
          }
          this.audioContext = null;
        }
      }
    };
  </script>
